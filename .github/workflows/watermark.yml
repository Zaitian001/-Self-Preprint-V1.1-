name: Auto Generate Preprint Watermark

on:
  push:
    paths:
      - 'PREPRINTS/**.md'  # 仅在 PREPRINTS 文件夹下的 Markdown 文件变动时触发

permissions:
  contents: write  # 赋予云端 Runner 写入仓库并推送代码的权限

jobs:
  generate-watermark:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史

      - name: 2. 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安装依赖库 (Pillow)
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: 4. 运行 CI 水印配对脚本
        run: python scripts/watermark_ci.py

      - name: 5. 自动提交并推送生成的水印图
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # 将生成的水印图片加入暂存区
          git add CURRENCY_REGISTRY/*.jpg
          
          # 检查是否有文件更新，避免没有变动时 commit 报错导致 workflow 挂掉
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: auto-generate secured banknote watermark [skip ci]"
            git push origin main
          else
            echo "没有检测到新生成的水印图片，跳过提交。"
          fi
